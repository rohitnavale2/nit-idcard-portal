{% extends "idcard_app/base.html" %}
{% block title %}{{ title }} — Admin{% endblock %}
{% block content %}
<div class="page-header"><div class="container"><h1><i class="bi bi-mortarboard me-2"></i>{{ title }}</h1></div></div>
<div class="container pb-5">
  <div class="row justify-content-center"><div class="col-lg-6">
    <div class="card-nit p-4">
      <form method="post" novalidate>
        {% csrf_token %}
        <div class="row g-3">
          <div class="col-12"><label class="form-label fw-500">Course Name *</label>{{ form.name }}</div>
          <div class="col-md-6"><label class="form-label fw-500">Short Name</label>{{ form.short_name }}</div>
          <div class="col-md-6"><label class="form-label fw-500">Duration</label>{{ form.duration }}</div>
          <div class="col-12"><label class="form-label fw-500">Description</label>{{ form.description }}</div>
          <div class="col-12">
            <div class="form-check">{{ form.is_active }}
              <label class="form-check-label fw-500">Active (visible to students)</label>
            </div>
          </div>
        </div>
        <div class="d-flex justify-content-between mt-4">
          <a href="{% url 'admin_course_list' %}" class="btn btn-outline-secondary">Cancel</a>
          <button type="submit" class="btn btn-nit-red px-5"><i class="bi bi-save me-1"></i>Save</button>
        </div>
      </form>
    </div>
  </div></div>
</div>
{% endblock %}
