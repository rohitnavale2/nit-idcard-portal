{% extends "idcard_app/base.html" %}
{% block title %}Confirm Delete{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center"><div class="col-lg-5">
    <div class="card-nit p-4 text-center">
      <div style="width:64px;height:64px;background:#fef2f2;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem">
        <i class="bi bi-trash" style="font-size:1.8rem;color:var(--nit-red)"></i>
      </div>
      <h5 class="fw-bold mb-1">{{ title }}</h5>
      <p class="text-muted mb-4">Are you sure you want to delete <strong>{{ obj }}</strong>? This cannot be undone.</p>
      <form method="post" class="d-flex gap-3 justify-content-center">
        {% csrf_token %}
        <a href="javascript:history.back()" class="btn btn-outline-secondary px-4">Cancel</a>
        <button type="submit" class="btn btn-danger px-4"><i class="bi bi-trash me-1"></i>Delete</button>
      </form>
    </div>
  </div></div>
</div>
{% endblock %}
